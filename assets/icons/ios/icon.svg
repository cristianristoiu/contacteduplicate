<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background Gradient (Standard for iOS icon) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061126"/>
      <stop offset="100%" stop-color="#111F4C"/>
    </linearGradient>

    <!-- Card Gradients -->
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24c8ff"/>
      <stop offset="100%" stop-color="#4d88ff"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a866ff"/>
      <stop offset="100%" stop-color="#7a3eff"/>
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    
    <!-- Inner Shadow for Circle -->
    <filter id="innerShadow">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0" />
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feFlood flood-color="black" flood-opacity="0.4" result="color"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feComposite in2="SourceAlpha" operator="in" />
      <feMerge>
        <feMergeNode in="SourceGraphic" />
        <feMergeNode />
      </feMerge>
    </filter>
  </defs>

  <!-- iOS Background (No transparency allowed) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Content -->
  <g filter="url(#shadow)">
    
    <!-- Left Card (Blue) -->
    <g transform="translate(345, 342) rotate(-6)">
      <rect width="170" height="245" rx="35" fill="url(#cardBlue)"/>
      <!-- User Icon -->
      <circle cx="85" cy="85" r="45" fill="white"/>
      <path d="M48 170c0-22 17-38 37-38s37 16 37 38v10H48v-10z" fill="white"/>
      <!-- Lines -->
      <rect x="38" y="195" width="95" height="12" rx="6" fill="white" opacity="0.4"/>
      <rect x="38" y="217" width="65" height="12" rx="6" fill="white" opacity="0.4"/>
    </g>

    <!-- Right Card (Purple) -->
    <g transform="translate(509, 342) rotate(6)">
      <rect width="170" height="245" rx="35" fill="url(#cardPurple)"/>
      <!-- User Icon -->
      <circle cx="85" cy="85" r="45" fill="white"/>
      <path d="M48 170c0-22 17-38 37-38s37 16 37 38v10H48v-10z" fill="white"/>
      <!-- Lines -->
      <rect x="38" y="195" width="95" height="12" rx="6" fill="white" opacity="0.4"/>
      <rect x="38" y="217" width="65" height="12" rx="6" fill="white" opacity="0.4"/>
    </g>
    
    <!-- Central Merge Icon -->
    <g transform="translate(512, 587)">
      <circle r="65" fill="#0d1839" stroke="#3a4a8c" stroke-width="3"/>
      <circle r="58" fill="#15224e" filter="url(#innerShadow)"/>
      
      <!-- Arrow Up with split base (Merge Symbol) -->
      <g transform="translate(-25, -30)">
        <!-- Vertical stem -->
        <rect x="18" y="18" width="14" height="25" rx="4" fill="white"/>
        <!-- Arrow head -->
        <path d="M7 25l18-20 18 20" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Split base -->
        <path d="M12 55c0-8 6-12 13-12s13 4 13 12" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
      </g>
    </g>
  </g>
</svg>