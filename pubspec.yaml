name: contacte_duplicate
description: Aplicatie mobila Android si iOS pentru gasirea si unirea contactelor duplicate local pe dispozitiv.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

flutter:
  uses-material-design: true
  generate: false
  assets:
    - assets/brand/logo.svg

  # Fonturile sistemului raman default in MVP: Roboto pe Android si SF Pro pe iOS.

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.2.7
  flutter_svg: ^2.0.10+1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
